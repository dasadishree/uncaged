<html>
    <head>
        <link rel="stylesheet" href="style.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Uncaged</title>
        <link rel="icon" type="image/x-icon" href="uncagedwbg.png">
    </head>

    <body>
        <!-- navbar -->
        <nav>
            <div class="logo" href="#">
                <img width="50px" src="uncagednobg.png" alt="Uncaged Logo">
                <div>
                    <div class="logo-text">UNCAGED</div>
                    <div class="logo-sub">Animal Rights</div>
                </div>
            </div>

            <ul class="nav-links">
                <li><a href="#what">What We Do</a></li>
                <li><a href="#who">Who We Are</a></li>
                <li><a href="#contact" class="btn-nav">Contact & Donate</a></li>
            </ul>
        </nav>

        <!-- hero section -->
        <section class="hero">
            <div class="hero-grid"></div>
            <div class="hero-content">
                <h1 class="hero-title">PROTECT<br>
                    <span class="outline">OUR</span><br>
                    ANIMALS
                </h1>
                <p class="hero-desc">Help support Uncaged as we fight against the cruelties of animal testing and abuse. Find out more about animal testing below and learn how you can get involved.</p>
            
                <div class="hero-btns">
                    <a href="#contact" class="btn btn-primary">Contact / Donate</a>
                    <a href="#action" class="btn btn-secondary">Take Action</a>
                </div>

                <div class="hero-image">

                </div>
            </div>
        </section>
    </body>
</html>
